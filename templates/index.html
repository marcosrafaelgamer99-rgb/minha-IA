<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #FFFFFF;
            --sidebar-bg: #FFFFFF;
            --border-color: #F2F2F2;
            --text-color: #000000;
            --text-muted: #A0A0A0;
            --liquid-ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; outline: none; transition: transform 0.2s var(--liquid-ease), background 0.2s ease, opacity 0.3s ease; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-color); 
            font-family: 'Inter', -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; 
        }

        /* EFEITO DE CRESCER AO PASSAR O MOUSE */
        .hover-scale:hover { transform: scale(1.05); }
        .btn-scale:active { transform: scale(0.95); }

        /* PRE-LOADER GIGANTE */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFF;
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-logo { width: 180px; filter: invert(1); animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }

        /* SIDEBAR SOBERANA */
        #sidebar {
            width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 40px 25px; z-index: 100;
        }
        .logo-nav { width: 70px; margin-bottom: 40px; filter: invert(1); cursor: pointer; }

        .btn-new {
            background: #F9F9F9; color: #000; border: none; padding: 18px;
            border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer;
            margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-new:hover { background: #F0F0F0; }

        #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .chat-item {
            padding: 14px 20px; border-radius: 12px; font-size: 14px; color: #666;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .chat-item:hover, .chat-item.active { background: #F9F9F9; color: #000; }
        .del-chat { opacity: 0; font-size: 14px; color: #DDD; border: none; background: none; cursor: pointer; }
        .chat-item:hover .del-chat { opacity: 1; }

        .sidebar-footer { border-top: 1px solid var(--border-color); padding-top: 20px; margin-top: 20px; }
        .settings-btn { width: 100%; text-align: left; background: none; border: none; font-size: 14px; font-weight: 700; color: #666; padding: 12px; cursor: pointer; border-radius: 10px; }
        .settings-btn:hover { background: #F9F9F9; color: #000; }

        /* TELA DE CONFIGURAÇÕES INTEIRA */
        #view-settings {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #FFFFFF; z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 100px;
        }
        /* BOTÃO FECHAR CONFIGURAÇÕES NO CANTO DIREITO */
        .close-settings-btn {
            position: absolute; top: 40px; right: 50px;
            background: transparent; border: none;
            font-size: 28px; font-weight: 300; color: #000;
            cursor: pointer; padding: 10px; border-radius: 50%;
        }
        
        .settings-container { width: 100%; max-width: 600px; text-align: left; }
        .settings-header { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-bottom: 60px; }
        .settings-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 30px 0; border-bottom: 1px solid #F2F2F2;
        }
        .settings-label { font-size: 16px; color: #999; font-weight: 500; }
        .settings-value { font-size: 16px; font-weight: 800; color: #000; }

        /* MAIN CONTENT */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .header {
            padding: 30px 50px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color); z-index: 90;
        }
        .header-title { font-size: 10px; font-weight: 900; color: #E0E0E0; letter-spacing: 5px; }

        .profile-img { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 1px solid var(--border-color); object-fit: cover; }
        
        .profile-dropdown {
            display: none; position: absolute; top: 90px; right: 50px;
            background: #FFF; border: 1px solid var(--border-color);
            border-radius: 20px; padding: 10px; width: 240px; z-index: 500;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }
        .profile-dropdown button {
            width: 100%; background: transparent; border: none; color: #666;
            padding: 15px 20px; text-align: left; cursor: pointer; font-size: 14px;
            font-weight: 700; border-radius: 12px;
        }
        .profile-dropdown button:hover { background: #F9F9F9; color: #000; }

        /* VIEWPORT MENSAGENS */
        #viewport {
            flex: 1; overflow-y: auto; padding: 80px 22% 160px 22%;
            display: flex; flex-direction: column; gap: 60px;
        }
        .msg-row { opacity: 0; transform: translateY(20px); animation: slideIn 0.8s var(--liquid-ease) forwards; }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        
        .role-tag { font-size: 10px; font-weight: 900; color: #F0F0F0; margin-bottom: 15px; letter-spacing: 3px; }
        .content { font-size: 17px; line-height: 2; color: #444; }
        .content b { color: #000; }

        /* DOCK CAPSULE */
        #dock-wrapper {
            position: absolute; bottom: 50px; left: 0; width: 100%;
            display: flex; justify-content: center; padding: 0 22%; z-index: 100;
        }
        #dock-capsule {
            display: flex; align-items: center; background: #FFF;
            border: 1px solid var(--border-color); padding: 10px 15px 10px 35px;
            border-radius: 100px; width: 100%;
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
        }
        #dock-capsule:focus-within { border-color: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.06); }

        #msg-in { flex: 1; background: transparent; border: none; font-size: 16px; height: 55px; font-weight: 500; }
        .btn-send {
            background: #000; color: #FFF; height: 50px; width: 50px;
            border-radius: 50%; border: none; cursor: pointer; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #F0F0F0; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- PRE-LOADER -->
    <div id="loader">
        <img src="/static/Gemini_Generated_Image_86oers86oers86oe-removebg-preview.png" class="loader-logo hover-scale">
    </div>

    <!-- ABA DE CONFIGURAÇÕES (TELA INTEIRA) -->
    <div id="view-settings">
        <!-- BOTÃO DE FECHAR NO CANTO SUPERIOR DIREITO -->
        <button class="close-settings-btn hover-scale btn-scale" onclick="switchView('chat')">✕</button>
        
        <div class="settings-container">
            <div class="settings-header">Preferências do Núcleo</div>
            
            <div class="settings-row hover-scale">
                <span class="settings-label">Modelo</span>
                <span class="settings-value">ANK 1.0</span>
            </div>
            
            <div class="settings-row hover-scale">
                <span class="settings-label">Plano</span>
                <span class="settings-value">Grátis</span>
            </div>
        </div>
    </div>

    <aside id="sidebar">
        <img src="/static/Gemini_Generated_Image_86oers86oers86oe-removebg-preview.png" class="logo-nav hover-scale" onclick="location.reload()">
        <button class="btn-new hover-scale btn-scale" onclick="createNewChat()">
            + NOVA CONVERSA
        </button>
        <div id="chat-list"></div>
        
        <div class="sidebar-footer">
            <button class="settings-btn hover-scale" onclick="switchView('settings')">⚙️ CONFIGURAÇÕES</button>
        </div>
    </aside>

    <main id="main">
        <header class="header">
            <div class="header-title" id="active-title">SISTEMA_ANK_ONLINE</div>
            <div class="profile-area">
                {% if user %}
                    <img src="{{ user.picture }}" class="profile-img hover-scale" onclick="toggleProfile()">
                    <div class="profile-dropdown" id="p-drop">
                        <button class="hover-scale" onclick="switchView('settings')">⚙️ Configurações</button>
                        <button class="hover-scale" onclick="location.href='/login'">🔄 Alternar Conta</button>
                        <button class="hover-scale" style="color: #FF4444;" onclick="location.href='/logout'">🚪 Desconectar</button>
                    </div>
                {% else %}
                    <button class="hover-scale btn-scale" onclick="location.href='/login'" style="background:#000; color:#fff; border:none; padding:12px 25px; font-size:11px; font-weight:900; border-radius:50px; cursor:pointer;">GOOGLE LOGIN</button>
                {% endif %}
            </div>
        </header>

        <div id="viewport"></div>

        <div id="dock-wrapper">
            <div id="dock-capsule" class="hover-scale">
                <input type="text" id="msg-in" placeholder="Transmita dados para a ANK 1.0..." onkeypress="if(event.key === 'Enter') send()" autocomplete="off">
                <button class="btn-send btn-scale" onclick="send()">↑</button>
            </div>
        </div>
    </main>

    <script>
        let curId = null;
        const sessions = {{ sessions | tojson | safe }};
        const vp = document.getElementById('viewport');

        window.onload = () => {
            renderList();
            if(sessions.length > 0) loadChat(sessions[0].id, sessions[0].title);
            setTimeout(() => {
                const l = document.getElementById('loader');
                l.style.opacity = '0';
                setTimeout(() => l.style.display = 'none', 600);
            }, 1500);
        };

        // ALTERNA ENTRE CHAT E CONFIGURAÇÕES
        function switchView(view) {
            const settings = document.getElementById('view-settings');
            if(view === 'settings') {
                settings.style.display = 'flex';
                settings.style.opacity = '0';
                setTimeout(() => settings.style.opacity = '1', 10);
            } else {
                settings.style.opacity = '0';
                setTimeout(() => settings.style.display = 'none', 600);
            }
        }

        function toggleProfile() {
            const d = document.getElementById('p-drop');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            sessions.forEach(s => {
                const d = document.createElement('div');
                d.className = `chat-item hover-scale ${curId === s.id ? 'active' : ''}`;
                d.innerHTML = `
                    <span style="flex:1" onclick="loadChat('${s.id}', '${s.title}')">${s.title}</span>
                    <button class="del-chat hover-scale btn-scale" onclick="delChat('${s.id}')">✕</button>
                `;
                list.appendChild(d);
            });
        }

        async function createNewChat() {
            await fetch('/new_chat', { method: 'POST' });
            location.reload();
        }

        async function loadChat(id, title) {
            curId = id;
            document.getElementById('active-title').innerText = "NÚCLEO_" + title.toUpperCase();
            vp.innerHTML = '';
            const r = await fetch(`/get_messages/${id}`);
            const ms = await r.json();
            ms.forEach(m => display(m.role, m.content, false));
            renderList();
            vp.scrollTop = vp.scrollHeight;
        }

        async function delChat(id) {
            if(!confirm("ELIMINAR SESSÃO?")) return;
            await fetch('/delete_chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
            location.reload();
        }

        function format(t) {
            let s = t.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            const r = /```([a-z]*)\n([\s\S]*?)```/g;
            return s.replace(r, (m, lang, code) => {
                return `<div class="hover-scale" style="background:#F9F9F9; border-radius:20px; padding:30px; margin:30px 0; border:1px solid #F0F0F0;">
                    <div style="font-size:10px; color:#CCC; margin-bottom:15px; font-weight:900;">${lang.toUpperCase()}</div>
                    <pre><code style="font-family: 'JetBrains Mono', monospace; font-size:15px;">${code.trim()}</code></pre>
                </div>`;
            });
        }

        function display(role, content, animate) {
            const d = document.createElement('div');
            d.className = `msg-row ${role === 'user' ? 'user' : 'assistant'}`;
            d.innerHTML = `<div class="role-tag">${role === 'user' ? 'AUTORIDADE' : 'ANK_CORE'}</div><div class="content"></div>`;
            vp.appendChild(d);
            const b = d.querySelector('.content');

            if(animate && role === 'assistant') {
                let i = 0;
                function type() {
                    if(i < content.length) {
                        b.textContent += content.charAt(i); i++;
                        vp.scrollTop = vp.scrollHeight; setTimeout(type, 1);
                    } else {
                        b.innerHTML = format(content); hljs.highlightAll();
                        vp.scrollTop = vp.scrollHeight;
                    }
                }
                type();
            } else {
                b.innerHTML = format(content); hljs.highlightAll();
            }
        }

        async function send() {
            const i = document.getElementById('msg-in');
            const m = i.value.trim(); if(!m) return;
            if(!curId) {
                const r = await fetch('/new_chat', { method: 'POST' });
                const sess = await r.json();
                curId = sess.id;
            }
            display('user', m, false); i.value = '';
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: m, chat_id: curId})
            });
            const data = await res.json();
            display('assistant', data.response, true);
        }

        window.onclick = (e) => {
            if (!e.target.matches('.profile-img')) {
                const d = document.getElementById('p-drop');
                if(d) d.style.display = 'none';
            }
        }
    </script>
</body>
</html>

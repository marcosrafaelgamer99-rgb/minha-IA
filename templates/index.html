<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    <style>
        /* Estética Hacker Elite 2026 */
        body { margin: 0; padding: 0; background-color: #050505; color: #e0e0e0; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #chat-container { width: 50%; display: flex; flex-direction: column; background-color: #0a0a0a; border-right: 1px solid #1f1f1f; }
        
        .header { padding: 20px; text-align: center; background-color: #111; border-bottom: 1px solid #00ffcc; color: #00ffcc; font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; text-shadow: 0 0 8px rgba(0, 255, 204, 0.5); }
        
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Caixas de Mensagem Baseadas nos seus Prints */
        .msg-box { background-color: #121212; border: 1px solid #222; border-radius: 10px; padding: 15px; position: relative; font-size: 15px; line-height: 1.6; word-wrap: break-word; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .user-label { color: #00bcd4; font-weight: bold; margin-bottom: 5px; display: block; font-size: 12px; letter-spacing: 1px; }
        .ank-label { color: #00ffcc; font-weight: bold; margin-bottom: 5px; display: block; font-size: 12px; letter-spacing: 1px; text-shadow: 0 0 5px rgba(0,255,204,0.4); }
        
        .bot-text { font-family: 'Courier New', Courier, monospace; color: #d4d4d4; white-space: pre-wrap; }
        
        #input-area { padding: 20px; display: flex; gap: 10px; background-color: #0a0a0a; border-top: 1px solid #1f1f1f; }
        input { flex: 1; background-color: #121212; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: #00ffcc; }
        
        button { background-color: #00ffcc; border: none; color: #000; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #00e6b8; box-shadow: 0 0 15px rgba(0, 255, 204, 0.6); }
        
        /* Painel de Visualização do Site */
        #preview-container { flex: 1; background: #000; display: flex; flex-direction: column; }
        .preview-header { padding: 10px; background: #111; color: #888; font-size: 12px; text-align: center; border-bottom: 1px solid #1f1f1f; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="header">ANK 1.0 _ NÚCLEO CEREBRAS</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite seu comando, Marcos..." onkeypress="if(event.key === 'Enter') send()">
        <button onclick="send()">EXECUTAR</button>
    </div>
</div>

<div id="preview-container">
    <div class="preview-header">LIVE PREVIEW [RENDER]</div>
    <iframe id="preview"></iframe>
</div>

<script>
    async function send() {
        const input = document.getElementById('user-input');
        const msg = input.value;
        if(!msg) return;

        // Renderiza a mensagem do Marcos
        document.getElementById('messages').innerHTML += `
            <div class="msg-box">
                <span class="user-label">MARCOS:</span>
                <div>${msg}</div>
            </div>`;
        input.value = '';

        // Indicador de digitação
        const loadingId = 'loading-' + Date.now();
        document.getElementById('messages').innerHTML += `
            <div id="${loadingId}" class="msg-box">
                <span class="ank-label">ANK_REPLY</span>
                <div class="bot-text" style="color: #666;">Estabelecendo conexão neural...</div>
            </div>`;
        
        // Rola para o final
        const msgDiv = document.getElementById('messages');
        msgDiv.scrollTop = msgDiv.scrollHeight;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            
            const data = await res.json();
            
            // Remove o "carregando" e insere a resposta real
            document.getElementById(loadingId).remove();
            
            // Escapa o HTML para não quebrar a caixa de chat
            let safeText = data.response.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            document.getElementById('messages').innerHTML += `
                <div class="msg-box">
                    <span class="ank-label">ANK_REPLY</span>
                    <div class="bot-text">${safeText}</div>
                </div>`;
                
            msgDiv.scrollTop = msgDiv.scrollHeight;
            
            // Injeta o código HTML gerado no Iframe
            const codeMatch = data.response.match(/<html[\s\S]*<\/html>/i);
            if(codeMatch) {
                document.getElementById('preview').srcdoc = codeMatch[0];
            }
        } catch(e) {
            document.getElementById(loadingId).querySelector('.bot-text').innerText = "[FALHA CRÍTICA DE REDE]";
        }
    }
</script>
</body>
</html>

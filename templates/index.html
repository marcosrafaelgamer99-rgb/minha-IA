<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --sidebar: #030303;
            --border: #111111;
            --text: #ffffff;
            --text-dim: #777777;
            --hover: #080808;
        }

        * { box-sizing: border-box; outline: none; }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Geist', 'Inter', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* SCROLLBAR 2026 STEALTH */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #111; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #222; }

        /* SIDEBAR BRUTALISTA */
        #sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
        }

        .sidebar-title {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #333;
            margin-bottom: 30px;
            padding-left: 10px;
            text-transform: uppercase;
        }

        .new-chat-btn {
            background: #fff;
            border: none;
            color: #000;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 25px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: #ccc; }

        #history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .history-item {
            padding: 12px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
            transition: 0.1s;
        }
        .history-item:hover { background: var(--hover); color: #fff; }
        .history-item.active { background: #080808; color: #fff; font-weight: 600; }
        .delete-btn { opacity: 0; font-size: 14px; transition: 0.2s; color: #333; }
        .history-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #ff0000; }

        /* MAIN */
        #main-container { flex: 1; display: flex; flex-direction: column; background: #000; }

        .top-bar {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .chat-name { font-size: 11px; font-weight: 700; color: #444; letter-spacing: 1px; }

        .profile-area { position: relative; display: flex; align-items: center; gap: 15px; }
        .profile-pic { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #111; cursor: pointer; }
        
        .dropdown {
            display: none; position: absolute; top: 45px; right: 0;
            background: #050505; border: 1px solid var(--border); border-radius: 4px;
            padding: 8px; width: 180px; z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,1);
        }
        .dropdown button {
            width: 100%; background: transparent; border: none; color: #555;
            padding: 10px; text-align: left; cursor: pointer; font-size: 11px;
            transition: 0.2s;
        }
        .dropdown button:hover { color: #fff; background: #080808; }

        /* CHAT WINDOW */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 50px 20%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .row { display: flex; flex-direction: column; animation: entry 0.4s ease-out; }
        @keyframes entry { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .role { font-size: 9px; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; color: #222; }
        .ank .role { color: #555; }

        .content { font-size: 15px; line-height: 1.8; color: #bbb; }
        .content b { color: #fff; }

        /* CODE BOX 2026 */
        .code-box {
            margin: 20px 0;
            background: #020202;
            border: 1px solid #111;
            border-radius: 4px;
            position: relative;
        }
        .code-header {
            padding: 10px 20px;
            background: #050505;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #444;
            border-bottom: 1px solid #111;
            font-weight: 700;
        }
        .copy-btn {
            background: transparent; border: 1px solid #222; color: #444;
            padding: 4px 10px; border-radius: 3px; cursor: pointer;
            font-size: 9px; text-transform: uppercase;
        }
        .copy-btn:hover { color: #fff; border-color: #444; }
        pre { margin: 0; padding: 20px; overflow-x: auto; font-size: 13px; }

        /* INPUT */
        #input-area { padding: 40px 20%; display: flex; gap: 20px; }
        #user-msg {
            flex: 1; background: transparent; border: 1px solid #111;
            color: #fff; padding: 16px 25px; border-radius: 4px;
            font-size: 14px; transition: 0.2s;
        }
        #user-msg:focus { border-color: #333; }
        
        .send-btn {
            background: #fff; color: #000; border: none;
            padding: 0 40px; border-radius: 4px; font-weight: 800;
            cursor: pointer; font-size: 11px; text-transform: uppercase;
        }

        /* LOGIN BUTTON GOOGLE */
        .google-login {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #fff; color: #000; border: none; padding: 12px;
            width: 100%; border-radius: 4px; font-weight: 700; cursor: pointer;
        }

        .typing { font-size: 10px; color: #222; margin-top: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-title">ANK 1.0_CORE</div>
        <button class="new-chat-btn" onclick="createNewChat()">+ NEW SESSION</button>
        <div id="history-list"></div>
    </aside>

    <main id="main-container">
        <header class="top-bar">
            <div class="chat-name" id="current-title">SISTEMA INICIALIZADO</div>
            <div class="profile-area">
                {% if user %}
                    <img src="{{ user.picture }}" class="profile-pic" id="p-img" onclick="toggleD()">
                {% else %}
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-pic" onclick="toggleD()">
                {% endif %}
                <div class="dropdown" id="d">
                    {% if user %}
                        <button onclick="location.href='/logout'">DESCONECTAR</button>
                        <button onclick="location.href='/login'">ALTERAR CONTA</button>
                    {% else %}
                        <button style="padding: 0;" onclick="location.href='/login'">
                            <div class="google-login">
                                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                                GOOGLE LOGIN
                            </div>
                        </button>
                    {% endif %}
                </div>
            </div>
        </header>

        <div id="chat-window"></div>

        <div id="input-area">
            <input type="text" id="user-msg" placeholder="Transmita dados..." onkeypress="if(event.key === 'Enter') send()" autocomplete="off">
            <button class="send-btn" onclick="send()">EXECUTAR</button>
        </div>
    </main>

    <script>
        let currentId = null;
        const sessions = {{ sessions | tojson | safe }};
        const win = document.getElementById('chat-window');
        const list = document.getElementById('history-list');
        const tick = String.fromCharCode(96);
        const triple = tick + tick + tick;

        window.onload = () => {
            renderList();
            if(sessions.length > 0) loadChat(sessions[0].id, sessions[0].title);
        };

        function renderList() {
            list.innerHTML = '';
            sessions.forEach(s => {
                const div = document.createElement('div');
                div.className = `history-item ${currentId === s.id ? 'active' : ''}`;
                div.innerHTML = `
                    <span style="flex:1" onclick="loadChat('${s.id}', '${s.title}')">${s.title.toUpperCase()}</span>
                    <span class="delete-btn" onclick="delChat('${s.id}')">✕</span>
                `;
                list.appendChild(div);
            });
        }

        async function createNewChat() {
            const res = await fetch('/new_chat', { method: 'POST' });
            location.reload();
        }

        async function loadChat(id, title) {
            currentId = id;
            document.getElementById('current-title').innerText = title.toUpperCase();
            win.innerHTML = '';
            const res = await fetch(`/get_messages/${id}`);
            const msgs = await res.json();
            msgs.forEach(m => display(m.role, m.content, false));
            renderList();
            win.scrollTop = win.scrollHeight;
        }

        async function delChat(id) {
            if(!confirm("ELIMINAR ESTA SESSÃO?")) return;
            await fetch('/delete_chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
            location.reload();
        }

        function toggleD() {
            const d = document.getElementById('d');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        function format(t) {
            let s = t.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            s = s.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            const regex = new RegExp(triple + "([a-zA-Z]*)\\n?([\\s\\S]*?)" + triple, "g");
            return s.replace(regex, (m, lang, code) => {
                return `<div class="code-box"><div class="code-header"><span>${lang || 'CODE'}</span><button class="copy-btn" onclick="copy(this)">Copy</button></div><pre><code class="language-${lang}">${code.trim()}</code></pre></div>`;
            });
        }

        function copy(btn) {
            const code = btn.closest('.code-box').querySelector('code').innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "COPIADO";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }

        function display(role, content, animate) {
            const div = document.createElement('div');
            div.className = `row ${role === 'user' ? 'user' : 'ank'}`;
            div.innerHTML = `<div class="role">${role === 'user' ? 'AUTORIDADE' : 'ANK 1.0'}</div><div class="content"></div>`;
            win.appendChild(div);
            const cDiv = div.querySelector('.content');

            if(animate && role === 'assistant') {
                let i = 0;
                function type() {
                    if(i < content.length) {
                        cDiv.textContent += content.charAt(i);
                        i++;
                        win.scrollTop = win.scrollHeight;
                        setTimeout(type, 2);
                    } else {
                        cDiv.innerHTML = format(content);
                        hljs.highlightAll();
                    }
                }
                type();
            } else {
                cDiv.innerHTML = format(content);
                hljs.highlightAll();
            }
        }

        async function send() {
            const input = document.getElementById('user-msg');
            const msg = input.value.trim();
            if(!msg) return;

            // Se não tiver chat ativo, cria um agora
            if(!currentId) {
                const res = await fetch('/new_chat', { method: 'POST' });
                const sess = await res.json();
                currentId = sess.id;
            }

            display('user', msg, false);
            input.value = '';

            const l = document.createElement('div');
            l.className = 'typing';
            l.innerText = 'ANK SINTETIZANDO...';
            win.appendChild(l);
            win.scrollTop = win.scrollHeight;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, chat_id: currentId})
            });
            const data = await res.json();
            l.remove();
            
            // Atualiza título na sidebar se for a primeira msg
            const sessionObj = sessions.find(s => s.id === currentId);
            if(sessionObj && sessionObj.title === "Novo Comando") {
                sessionObj.title = data.title;
                renderList();
                document.getElementById('current-title').innerText = data.title.toUpperCase();
            }

            display('assistant', data.response, true);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --sidebar: #040404;
            --border: #111111;
            --text-main: #ffffff;
            --text-dim: #444;
            --liquid: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; 
        }

        /* PRE-LOADER SOBERANO */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--liquid);
        }
        .loader-logo {
            width: 120px; height: 120px; margin-bottom: 25px;
            animation: pulseLogo 2s infinite ease-in-out;
        }
        @keyframes pulseLogo {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* SIDEBAR */
        #sidebar {
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 25px;
        }
        .logo-small { width: 30px; margin-bottom: 20px; }

        .btn-new {
            background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 4px; font-size: 11px; font-weight: 800; cursor: pointer;
            margin-bottom: 30px; transition: 0.2s;
        }
        .btn-new:hover { background: #ccc; }

        #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .chat-item {
            padding: 10px 15px; border-radius: 4px; font-size: 12px; color: var(--text-dim);
            cursor: pointer; display: flex; justify-content: space-between; transition: 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: #080808; color: #fff; }

        /* MAIN AREA */
        #main { flex: 1; display: flex; flex-direction: column; }
        .top-bar {
            padding: 15px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }

        /* BOTÃO GOOGLE LOGIN OFICIAL */
        .google-login-btn {
            display: flex; align-items: center; gap: 10px;
            background: #fff; color: #000; border: none; padding: 8px 16px;
            border-radius: 4px; font-size: 12px; font-weight: 700; cursor: pointer;
            transition: 0.2s;
        }
        .google-login-btn:hover { background: #ddd; }

        .profile-img { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 1px solid #222; }

        #viewport {
            flex: 1; overflow-y: auto; padding: 60px 20%;
            display: flex; flex-direction: column; gap: 40px; scroll-behavior: smooth;
        }

        /* MENSAGENS FLUIDAS */
        .msg { opacity: 0; transform: translateY(15px); animation: fadeIn 0.5s var(--liquid) forwards; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .role { font-size: 10px; font-weight: 900; color: #111; margin-bottom: 10px; letter-spacing: 2px; }
        .assistant .role { color: #333; }
        .body { font-size: 15px; line-height: 1.8; color: #888; }
        .body.thinking { color: #222; }
        .body b { color: #fff; }

        /* CODE BOX */
        .code-box { margin: 25px 0; background: #020202; border: 1px solid #0f0f0f; border-radius: 4px; }
        .code-nav {
            padding: 10px 20px; background: #050505; display: flex; justify-content: space-between;
            font-size: 9px; font-weight: 900; color: #222; border-bottom: 1px solid #0f0f0f;
        }
        .copy-btn { background: transparent; border: 1px solid #111; color: #333; padding: 4px 10px; cursor: pointer; }
        pre { margin: 0; padding: 25px; overflow-x: auto; font-size: 14px; }

        /* INPUT AREA */
        #input-area { padding: 40px 20%; border-top: 1px solid var(--border); display: flex; gap: 20px; }
        #msg-in {
            flex: 1; background: transparent; border: 1px solid #111;
            color: #fff; padding: 16px 25px; border-radius: 4px; font-size: 14px;
        }
        .exec-btn { background: #fff; color: #000; border: none; padding: 0 40px; font-weight: 900; border-radius: 4px; cursor: pointer; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #111; }
    </style>
</head>
<body>

    <!-- PRE-LOADER -->
    <div id="loader">
        <!-- APONTA PARA A TUA LOGO LOCAL -->
        <img src="/static/Gemini_Generated_Image_86oers86oers86oe-removebg-preview.png" class="loader-logo" alt="ANK">
        <div style="font-size: 10px; letter-spacing: 6px; color: #111; font-weight: 900;">INITIALIZING_ANK_CORE</div>
    </div>

    <aside id="sidebar">
        <img src="/static/Gemini_Generated_Image_86oers86oers86oe-removebg-preview.png" class="logo-small" alt="ANK">
        <button class="btn-new" onclick="createNewChat()">+ NEW SESSION</button>
        <div id="chat-list"></div>
    </aside>

    <main id="main">
        <header class="top-bar">
            <div id="active-title" style="font-size: 10px; font-weight: 900; color: #111; letter-spacing: 1px;">ANK 1.0 SOBERANA</div>
            
            {% if user %}
                <img src="{{ user.picture }}" class="profile-img" onclick="location.href='/logout'">
            {% else %}
                <!-- BOTÃO DE LOGIN QUE ESTAVA EM FALTA -->
                <button class="google-login-btn" onclick="location.href='/login'">
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    LOGIN COM GOOGLE
                </button>
            {% endif %}
        </header>

        <div id="chat-window"></div>

        <div id="input-area">
            <input type="text" id="msg-in" placeholder="Transmitir comando..." onkeypress="if(event.key === 'Enter') send()" autocomplete="off">
            <button class="exec-btn" onclick="send()">EXECUTAR</button>
        </div>
    </main>

    <script>
        let curId = null;
        const sessions = {{ sessions | tojson | safe }};
        const vp = document.getElementById('chat-window');

        window.onload = () => {
            renderList();
            if(sessions.length > 0) loadChat(sessions[0].id, sessions[0].title);
            
            // Remove o loader com suavidade
            setTimeout(() => {
                const l = document.getElementById('loader');
                l.style.opacity = '0';
                setTimeout(() => l.style.display = 'none', 800);
            }, 2000);
        };

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            sessions.forEach(s => {
                const d = document.createElement('div');
                d.className = `chat-item ${curId === s.id ? 'active' : ''}`;
                d.innerHTML = `<span onclick="loadChat('${s.id}', '${s.title}')">${s.title}</span>`;
                list.appendChild(d);
            });
        }

        async function createNewChat() {
            const r = await fetch('/new_chat', { method: 'POST' });
            location.reload();
        }

        async function loadChat(id, title) {
            curId = id;
            document.getElementById('active-title').innerText = title.toUpperCase();
            vp.innerHTML = '';
            const r = await fetch(`/get_messages/${id}`);
            const ms = await r.json();
            ms.forEach(m => display(m.role, m.content, false));
            renderList();
            vp.scrollTop = vp.scrollHeight;
        }

        function format(t) {
            let s = t.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            const r = /```([a-z]*)\n([\s\S]*?)```/g;
            return s.replace(r, (m, lang, code) => {
                return `<div class="code-box"><div class="code-nav"><span>${lang.toUpperCase() || 'CODE'}</span><button class="copy-btn" onclick="copy(this)">COPY</button></div><pre><code class="language-${lang}">${code.trim()}</code></pre></div>`;
            });
        }

        function copy(b) {
            navigator.clipboard.writeText(b.closest('.code-box').querySelector('code').innerText);
            b.innerText = "DONE"; setTimeout(() => b.innerText = "COPY", 2000);
        }

        function display(role, content, animate) {
            const d = document.createElement('div');
            d.className = `msg ${role === 'user' ? 'user' : 'assistant'}`;
            d.innerHTML = `<div class="role">${role === 'user' ? 'USER' : 'ANK_CORE'}</div><div class="body"></div>`;
            vp.appendChild(d);
            const b = d.querySelector('.body');

            if(animate) {
                b.classList.add('thinking');
                let i = 0;
                function type() {
                    if(i < content.length) {
                        b.textContent += content.charAt(i); i++;
                        vp.scrollTop = vp.scrollHeight; setTimeout(type, 1);
                    } else {
                        b.classList.remove('thinking');
                        b.innerHTML = format(content); hljs.highlightAll();
                        vp.scrollTop = vp.scrollHeight;
                    }
                }
                type();
            } else {
                b.innerHTML = format(content); hljs.highlightAll();
            }
        }

        async function send() {
            const i = document.getElementById('msg-in');
            const m = i.value.trim(); if(!m) return;
            if(!curId) {
                const r = await fetch('/new_chat', { method: 'POST' });
                const sess = await r.json();
                curId = sess.id;
            }
            display('user', m, false); i.value = '';
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: m, chat_id: curId})
            });
            const data = await res.json();
            display('assistant', data.response, true);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --sidebar: #050505;
            --border: #121212;
            --text-main: #ffffff;
            --text-dim: #555555;
            --accent: #ffffff;
            --liquid-ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; outline: none; }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* SCROLLBAR STEALTH */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }

        /* PRE-LOADER SOBERANO */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s var(--liquid-ease);
        }
        .loader-logo {
            width: 100px; height: 100px;
            animation: pulseLogo 2.5s infinite ease-in-out;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.05));
        }
        @keyframes pulseLogo {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }
        .loader-text {
            margin-top: 30px; font-size: 10px; letter-spacing: 5px; 
            color: #222; font-weight: 900; text-transform: uppercase;
        }

        /* SIDEBAR (ESTILO LINEAR) */
        #sidebar {
            width: 280px; background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 30px 15px; transition: transform 0.6s var(--liquid-ease);
        }

        .new-btn {
            background: #fff; color: #000; border: none; padding: 14px;
            border-radius: 4px; font-size: 11px; font-weight: 800; cursor: pointer;
            margin-bottom: 40px; transition: 0.3s;
        }
        .new-btn:hover { background: #ccc; }

        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .history-item {
            padding: 12px 15px; border-radius: 4px; cursor: pointer; font-size: 13px;
            color: var(--text-dim); display: flex; justify-content: space-between;
            align-items: center; transition: 0.2s;
        }
        .history-item:hover, .history-item.active { background: #0a0a0a; color: #fff; }
        .del-chat { opacity: 0; color: #333; transition: 0.2s; }
        .history-item:hover .del-chat { opacity: 1; }

        /* MAIN VIEWPORT */
        #main { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        .header {
            padding: 20px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }
        .header-title { font-size: 10px; font-weight: 900; color: #222; letter-spacing: 2px; }

        .profile-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #111; cursor: pointer; overflow: hidden; }
        .profile-btn img { width: 100%; height: 100%; object-fit: cover; }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 60px 20%;
            display: flex; flex-direction: column; gap: 50px;
            scroll-behavior: smooth;
        }

        /* MENSAGENS LÍQUIDAS */
        .msg-row { opacity: 0; transform: translateY(20px); animation: liquidIn 0.7s var(--liquid-ease) forwards; }
        @keyframes liquidIn { to { opacity: 1; transform: translateY(0); } }

        .role-label { font-size: 9px; font-weight: 900; letter-spacing: 2px; color: #1a1a1a; margin-bottom: 15px; }
        .assistant .role-label { color: #333; }

        .content { font-size: 15px; line-height: 1.8; color: #999; }
        .content.thinking { color: #333; }
        .content b { color: #fff; }

        /* CODE DESIGN 2026 */
        .code-block {
            margin: 30px 0; background: #020202; border: 1px solid #0f0f0f; border-radius: 4px;
        }
        .code-nav {
            padding: 10px 20px; background: #050505; display: flex; justify-content: space-between;
            font-size: 9px; font-weight: 900; color: #222; border-bottom: 1px solid #0f0f0f;
        }
        .copy-btn { background: transparent; border: 1px solid #111; color: #333; padding: 4px 10px; cursor: pointer; }
        .copy-btn:hover { color: #fff; border-color: #333; }
        pre { margin: 0; padding: 25px; overflow-x: auto; font-size: 14px; }

        /* INPUT SYSTEM */
        #dock { padding: 40px 20%; border-top: 1px solid var(--border); display: flex; gap: 20px; background: #000; }
        #user-input {
            flex: 1; background: transparent; border: 1px solid #111;
            color: #fff; padding: 18px 25px; border-radius: 6px; font-size: 14px; transition: 0.3s;
        }
        #user-input:focus { border-color: #333; background: #030303; }
        .send-btn {
            background: #fff; color: #000; border: none; padding: 0 40px;
            font-weight: 900; border-radius: 4px; cursor: pointer; font-size: 11px;
        }

        /* LOADING ORBIT */
        .neural-load {
            display: inline-block; width: 12px; height: 12px; border: 1px solid #222;
            border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-left: 15px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- PRE-LOADER COM TUA LOGO -->
    <div id="preloader">
        <img src="https://i.imgur.com/86oers8.png" class="loader-logo" alt="ANK LOGO">
        <div class="loader-text">Initializing ANK_CORE v1.0</div>
    </div>

    <aside id="sidebar">
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 5px; color: #111; margin-bottom: 40px;">ANK_SOBERANA</div>
        <button class="new-btn" onclick="createNewChat()">+ NEW SESSION</button>
        <div id="history-list"></div>
    </aside>

    <main id="main">
        <header class="header">
            <div class="header-title" id="active-title">SISTEMA OPERACIONAL</div>
            <div class="profile-btn" onclick="location.href='/logout'">
                {% if user %}
                    <img src="{{ user.picture }}" alt="User">
                {% else %}
                    <div style="background:#111; width:100%; height:100%;" onclick="location.href='/login'"></div>
                {% endif %}
            </div>
        </header>

        <div id="chat-window"></div>

        <div id="dock">
            <input type="text" id="user-input" placeholder="Transmitir comando neural..." onkeypress="if(event.key === 'Enter') send()">
            <button class="send-btn" onclick="send()">EXECUTAR</button>
        </div>
    </main>

    <script>
        let curId = null;
        const sessions = {{ sessions | tojson | safe }};
        const win = document.getElementById('chat-window');

        window.onload = () => {
            renderList();
            if(sessions.length > 0) loadChat(sessions[0].id, sessions[0].title);
            
            // Remove o loader após o sistema inicializar
            setTimeout(() => {
                const p = document.getElementById('preloader');
                p.style.opacity = '0';
                setTimeout(() => p.style.display = 'none', 1000);
            }, 1800);
        };

        function renderList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = `history-item ${curId === s.id ? 'active' : ''}`;
                item.innerHTML = `
                    <span onclick="loadChat('${s.id}', '${s.title}')">${s.title.toUpperCase()}</span>
                    <span class="del-chat" onclick="delChat('${s.id}')">✕</span>
                `;
                list.appendChild(item);
            });
        }

        async function createNewChat() {
            const r = await fetch('/new_chat', { method: 'POST' });
            location.reload();
        }

        async function loadChat(id, title) {
            curId = id;
            document.getElementById('active-title').innerText = title.toUpperCase();
            win.innerHTML = '';
            const r = await fetch(`/get_messages/${id}`);
            const ms = await r.json();
            ms.forEach(m => display(m.role, m.content, false));
            renderList();
            win.scrollTop = win.scrollHeight;
        }

        async function delChat(id) {
            if(!confirm("ELIMINAR SESSÃO?")) return;
            await fetch('/delete_chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
            location.reload();
        }

        function format(t) {
            let s = t.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            const r = /```([a-z]*)\n([\s\S]*?)```/g;
            return s.replace(r, (m, lang, code) => {
                return `
                <div class="code-block">
                    <div class="code-nav"><span>${lang.toUpperCase() || 'CODE'}</span><button class="copy-btn" onclick="copy(this)">COPY</button></div>
                    <pre><code class="language-${lang}">${code.trim()}</code></pre>
                </div>`;
            });
        }

        function copy(b) {
            const code = b.closest('.code-block').querySelector('code').innerText;
            navigator.clipboard.writeText(code);
            b.innerText = "COPIADO"; setTimeout(() => b.innerText = "COPY", 2000);
        }

        function display(role, content, animate) {
            const div = document.createElement('div');
            div.className = `msg-row ${role === 'user' ? 'user' : 'assistant'}`;
            div.innerHTML = `<div class="role-label">${role === 'user' ? 'AUTORIDADE' : 'ANK_CORE'}</div><div class="content"></div>`;
            win.appendChild(div);
            const b = div.querySelector('.content');

            if(animate && role === 'assistant') {
                b.classList.add('thinking');
                const loader = document.createElement('span');
                loader.className = 'neural-load';
                div.querySelector('.role-label').appendChild(loader);

                let i = 0;
                function type() {
                    if(i < content.length) {
                        b.textContent += content.charAt(i); i++;
                        win.scrollTop = win.scrollHeight;
                        setTimeout(type, 1);
                    } else {
                        loader.remove();
                        b.classList.remove('thinking');
                        b.innerHTML = format(content); hljs.highlightAll();
                        win.scrollTop = win.scrollHeight;
                    }
                }
                type();
            } else {
                b.innerHTML = format(content); hljs.highlightAll();
            }
        }

        async function send() {
            const i = document.getElementById('user-input');
            const m = i.value.trim(); if(!m) return;

            if(!curId) {
                const r = await fetch('/new_chat', { method: 'POST' });
                const sess = await r.json();
                curId = sess.id;
            }

            display('user', m, false); i.value = '';
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: m, chat_id: curId})
            });
            const data = await res.json();
            display('assistant', data.response, true);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ANK 1.0 | SOBERANA</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #chat-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; background: #1a1a1a; }
        .user { border-left: 3px solid #00ffcc; }
        .bot { border-left: 3px solid #ff00ff; white-space: pre-wrap; }
        #input-area { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #333; color: white; padding: 10px; }
        button { background: #00ffcc; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #preview-container { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Comande a ANK, Marcos...">
        <button onclick="send()">ENVIAR</button>
    </div>
</div>

<div id="preview-container">
    <iframe id="preview"></iframe>
</div>

<script>
    async function send() {
        const input = document.getElementById('user-input');
        const msg = input.value;
        if(!msg) return;

        document.getElementById('messages').innerHTML += `<div class="msg user"><b>Marcos:</b> ${msg}</div>`;
        input.value = '';

        const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        
        const data = await res.json();
        document.getElementById('messages').innerHTML += `<div class="msg bot"><b>ANK 1.0:</b> ${data.response}</div>`;
        
        // Tenta extrair código para o iframe
        const codeMatch = data.response.match(/<html[\s\S]*<\/html>/i);
        if(codeMatch) {
            document.getElementById('preview').srcdoc = codeMatch[0];
        }
    }
</script>
</body>
</html>

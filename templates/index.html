<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --sidebar: #020202;
            --border: #0d0d0d;
            --text-main: #ffffff;
            --text-dim: #333333;
            --liquid: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; 
        }

        /* PRE-LOADER SOBERANO */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s var(--liquid);
        }
        .loader-logo {
            width: 140px; height: 140px; margin-bottom: 30px;
            animation: pulseLogo 2s infinite ease-in-out;
        }
        @keyframes pulseLogo {
            0%, 100% { opacity: 0.1; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* SIDEBAR BRUTALISTA */
        #sidebar {
            width: 300px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 35px 20px;
        }
        .logo-nav { width: 50px; margin-bottom: 30px; }

        .btn-new {
            background: #fff; color: #000; border: none; padding: 15px;
            border-radius: 2px; font-size: 11px; font-weight: 900; cursor: pointer;
            margin-bottom: 40px; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-new:hover { background: #ccc; }

        #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .chat-item {
            padding: 14px 18px; border-radius: 2px; font-size: 12px; color: var(--text-dim);
            cursor: pointer; display: flex; justify-content: space-between; transition: 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: #050505; color: #fff; }
        .del-chat { opacity: 0; color: #222; transition: 0.2s; font-size: 14px; }
        .chat-item:hover .del-chat { opacity: 1; }
        .del-chat:hover { color: #ff0000; }

        /* MAIN VIEWPORT */
        #main { flex: 1; display: flex; flex-direction: column; background: #000; }
        
        .top-bar {
            padding: 25px 45px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }
        .header-status { font-size: 9px; font-weight: 900; color: #151515; letter-spacing: 4px; text-transform: uppercase; }

        /* PERFIL DROPDOWN */
        .profile-area { position: relative; }
        .profile-img { 
            width: 34px; height: 34px; border-radius: 50%; cursor: pointer; 
            border: 1px solid #111; transition: 0.2s;
        }
        .profile-img:hover { border-color: #333; }
        
        .profile-dropdown {
            display: none; position: absolute; top: 45px; right: 0;
            background: #080808; border: 1px solid var(--border);
            border-radius: 4px; padding: 10px; width: 200px; z-index: 500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .profile-dropdown button {
            width: 100%; background: transparent; border: none; color: #555;
            padding: 12px; text-align: left; cursor: pointer; font-size: 11px;
            font-weight: 700; transition: 0.2s;
        }
        .profile-dropdown button:hover { color: #fff; background: #111; }

        /* CHAT WINDOW */
        #viewport {
            flex: 1; overflow-y: auto; padding: 60px 22%;
            display: flex; flex-direction: column; gap: 50px; scroll-behavior: smooth;
        }

        .row { opacity: 0; transform: translateY(15px); animation: liquidIn 0.6s var(--liquid) forwards; }
        @keyframes liquidIn { to { opacity: 1; transform: translateY(0); } }

        .label { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #111; margin-bottom: 12px; text-transform: uppercase; }
        .assistant .label { color: #222; }

        .content { font-size: 15px; line-height: 1.9; color: #666; transition: 0.3s; }
        .content.thinking { color: #222; }
        .content b { color: #fff; }

        /* CODE BOX 2026 */
        .code-wrap { margin: 30px 0; background: #010101; border: 1px solid #0a0a0a; border-radius: 4px; }
        .code-top {
            padding: 12px 20px; background: #050505; display: flex; justify-content: space-between;
            font-size: 9px; font-weight: 900; color: #1a1a1a; border-bottom: 1px solid #0a0a0a;
        }
        .copy-btn { background: transparent; border: 1px solid #111; color: #333; padding: 5px 12px; cursor: pointer; font-size: 9px; }
        pre { margin: 0; padding: 25px; overflow-x: auto; font-size: 14px; }

        /* INPUT AREA */
        #dock { padding: 40px 22%; border-top: 1px solid var(--border); display: flex; gap: 25px; background: #000; }
        #msg-in {
            flex: 1; background: transparent; border: 1px solid #0d0d0d;
            color: #fff; padding: 18px 28px; border-radius: 4px; font-size: 15px; transition: 0.3s;
        }
        #msg-in:focus { border-color: #222; background: #010101; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 45px; font-weight: 900; cursor: pointer; border-radius: 4px; font-size: 11px; }

        /* LOADING ORBIT */
        .orbit {
            display: inline-block; width: 12px; height: 12px; border: 1px solid #111;
            border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-left: 15px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #0a0a0a; }
    </style>
</head>
<body>

    <!-- PRE-LOADER -->
    <div id="loader">
        <img src="/static/Gemini_Generated_Image_86oers86oers86oe-removebg-preview.png" class="loader-logo" alt="ANK">
        <div class="loader-text">ANK_CORE // INITIALIZING</div>
    </div>

    <aside id="sidebar">
        <img src="/static/Gemini_Generated_Image_86oers86oers86oe-removebg-preview.png" class="logo-nav" alt="ANK">
        <button class="btn-new" onclick="createNewChat()">+ NEW SESSION</button>
        <div id="chat-list"></div>
    </aside>

    <main id="main">
        <header class="top-bar">
            <div class="header-status" id="active-title">ESTADO: PRONTO</div>
            
            <div class="profile-area">
                {% if user %}
                    <img src="{{ user.picture }}" class="profile-img" onclick="toggleProfile()">
                    <div class="profile-dropdown" id="p-drop">
                        <button onclick="location.href='/login'">ALTERAR CONTA</button>
                        <button style="color: #ff3333;" onclick="location.href='/logout'">DESCONECTAR NÚCLEO</button>
                    </div>
                {% else %}
                    <button onclick="location.href='/login'" style="background:#fff; color:#000; border:none; padding:8px 15px; font-size:10px; font-weight:900; cursor:pointer;">GOOGLE LOGIN</button>
                {% endif %}
            </div>
        </header>

        <div id="chat-window"></div>

        <div id="dock">
            <input type="text" id="msg-in" placeholder="Transmitir dados para ANK 1.0..." onkeypress="if(event.key === 'Enter') send()" autocomplete="off">
            <button class="send-btn" onclick="send()">EXECUTAR</button>
        </div>
    </main>

    <script>
        let curId = null;
        const sessions = {{ sessions | tojson | safe }};
        const vp = document.getElementById('chat-window');

        window.onload = () => {
            renderList();
            if(sessions.length > 0) loadChat(sessions[0].id, sessions[0].title);
            
            setTimeout(() => {
                const l = document.getElementById('loader');
                l.style.opacity = '0';
                setTimeout(() => l.style.display = 'none', 1000);
            }, 2000);
        };

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            sessions.forEach(s => {
                const d = document.createElement('div');
                d.className = `chat-item ${curId === s.id ? 'active' : ''}`;
                d.innerHTML = `
                    <span onclick="loadChat('${s.id}', '${s.title}')">${s.title.toUpperCase()}</span>
                    <span class="del-chat" onclick="delChat('${s.id}')">✕</span>
                `;
                list.appendChild(d);
            });
        }

        async function createNewChat() {
            await fetch('/new_chat', { method: 'POST' });
            location.reload();
        }

        async function loadChat(id, title) {
            curId = id;
            document.getElementById('active-title').innerText = "ESTADO: " + title.toUpperCase();
            vp.innerHTML = '';
            const r = await fetch(`/get_messages/${id}`);
            const ms = await r.json();
            ms.forEach(m => display(m.role, m.content, false));
            renderList();
            vp.scrollTop = vp.scrollHeight;
        }

        async function delChat(id) {
            if(!confirm("TERMINAR SESSÃO?")) return;
            await fetch('/delete_chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
            location.reload();
        }

        function toggleProfile() {
            const d = document.getElementById('p-drop');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        // Fecha dropdown ao clicar fora
        window.onclick = (e) => {
            if (!e.target.matches('.profile-img')) {
                const d = document.getElementById('p-drop');
                if(d) d.style.display = 'none';
            }
        }

        function format(t) {
            let s = t.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            const r = /```([a-z]*)\n([\s\S]*?)```/g;
            return s.replace(r, (m, lang, code) => {
                return `<div class="code-wrap"><div class="code-top"><span>${lang.toUpperCase() || 'VOID'}</span><button class="copy-btn" onclick="copy(this)">COPY</button></div><pre><code class="language-${lang}">${code.trim()}</code></pre></div>`;
            });
        }

        function copy(b) {
            navigator.clipboard.writeText(b.closest('.code-wrap').querySelector('code').innerText);
            b.innerText = "DONE"; setTimeout(() => b.innerText = "COPY", 2000);
        }

        function display(role, content, animate) {
            const d = document.createElement('div');
            d.className = `row ${role === 'user' ? 'user' : 'assistant'}`;
            d.innerHTML = `<div class="label">${role === 'user' ? 'AUTORIDADE' : 'ANK_CORE'}</div><div class="content"></div>`;
            vp.appendChild(d);
            const b = d.querySelector('.content');

            if(animate && role === 'assistant') {
                b.classList.add('thinking');
                const loader = document.createElement('span');
                loader.className = 'orbit';
                d.querySelector('.label').appendChild(loader);

                let i = 0;
                function type() {
                    if(i < content.length) {
                        b.textContent += content.charAt(i); i++;
                        vp.scrollTop = vp.scrollHeight; setTimeout(type, 1);
                    } else {
                        loader.remove();
                        b.classList.remove('thinking');
                        b.innerHTML = format(content); hljs.highlightAll();
                        vp.scrollTop = vp.scrollHeight;
                    }
                }
                type();
            } else {
                b.innerHTML = format(content); hljs.highlightAll();
            }
        }

        async function send() {
            const i = document.getElementById('msg-in');
            const m = i.value.trim(); if(!m) return;
            if(!curId) {
                const r = await fetch('/new_chat', { method: 'POST' });
                const sess = await r.json();
                curId = sess.id;
            }
            display('user', m, false); i.value = '';
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: m, chat_id: curId})
            });
            const data = await res.json();
            display('assistant', data.response, true);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <!-- BIBLIOTECAS DE CORES PARA O CÓDIGO (HIGHLIGHT.JS) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        /* ESTÉTICA 2026: MINIMALISMO BRUTALISTA BLACK & WHITE */
        body { 
            margin: 0; padding: 0; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif; 
            display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }

        /* ANIMAÇÕES FLUIDAS */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseDot {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* BARRA SUPERIOR */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 30px; background-color: #000; 
            border-bottom: 1px solid #222; 
            z-index: 100; 
        }
        .system-logo { 
            color: #fff; font-weight: 600; letter-spacing: -0.5px; 
            font-size: 1.1rem; 
        }

        .user-section { position: relative; display: flex; align-items: center; gap: 15px; }
        .status-badge { 
            font-size: 11px; font-family: monospace; padding: 4px 8px; 
            border-radius: 4px; border: 1px solid #333; color: #888;
        }
        .profile-pic { 
            width: 36px; height: 36px; border-radius: 50%; 
            border: 1px solid #333; cursor: pointer; transition: 0.3s; 
            background: #111; object-fit: cover;
        }
        .profile-pic.active { border-color: #fff; }

        /* MENU DROPDOWN */
        .dropdown { 
            display: none; position: absolute; top: 55px; right: 0; 
            background: #0a0a0a; border: 1px solid #222; border-radius: 6px; 
            padding: 15px; width: 220px; box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            z-index: 200;
        }
        .dropdown p { margin: 0 0 10px 0; font-size: 13px; color: #fff; }
        .dropdown hr { border: 0; border-top: 1px solid #222; margin: 10px 0; }
        .menu-btn { 
            width: 100%; padding: 10px; margin-bottom: 5px; 
            background: transparent; border: 1px solid #333; color: #ccc; 
            border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .menu-btn:hover { background: #fff; color: #000; border-color: #fff; }
        .logout-btn { color: #ff5555; border-color: #331111; }
        .logout-btn:hover { background: #ff5555; color: #fff; border-color: #ff5555; }
        
        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background-color: #fff; color: #000; border: none; font-weight: 500;
            padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-size: 12px;
            transition: 0.2s;
        }
        .google-btn:hover { background-color: #ddd; }

        /* ÁREA CENTRAL */
        .main-view { 
            display: flex; flex: 1; overflow: hidden; 
            justify-content: center; background-color: #000;
        }
        
        #chat-side { 
            width: 100%; max-width: 900px; 
            display: flex; flex-direction: column; 
            background-color: #000; 
            border-left: 1px solid #111;
            border-right: 1px solid #111;
        }
        #messages { 
            flex: 1; overflow-y: auto; padding: 40px 30px; 
            display: flex; flex-direction: column; gap: 25px; 
            scroll-behavior: smooth;
        }

        /* MENSAGENS COM ANIMAÇÃO SLIDE UP */
        .msg-card { 
            background-color: transparent; border: none; 
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            padding: 0; max-width: 100%;
        }
        .label-user { color: #888; font-weight: 600; font-size: 11px; margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 1px;}
        .label-ank { color: #fff; font-weight: 600; font-size: 11px; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .text-content { font-size: 15px; line-height: 1.6; color: #d4d4d4; }
        
        /* O NOVO SISTEMA DE CÓDIGO (CORES E BOTÃO DE COPIAR) */
        .code-wrapper {
            margin-top: 15px;
            margin-bottom: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d2d2d;
            padding: 8px 15px;
            color: #aaa;
            font-size: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-bottom: 1px solid #444;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #fff; color: #000; }
        pre { margin: 0; padding: 15px; overflow-x: auto; font-size: 14px;}
        
        /* INPUT AREA */
        #input-box { 
            padding: 30px; display: flex; gap: 15px; 
            background-color: #000; border-top: 1px solid #111; 
        }
        #user-msg { 
            flex: 1; background: #0a0a0a; border: 1px solid #333; 
            color: #fff; padding: 15px 20px; border-radius: 6px; outline: none;
            font-size: 15px; transition: 0.2s;
        }
        #user-msg:focus { border-color: #fff; }
        .send-btn { 
            background: #fff; color: #000; border: none; 
            padding: 0 35px; border-radius: 6px; font-weight: 600; 
            cursor: pointer; transition: 0.2s; font-size: 13px; letter-spacing: 1px;
        }
        .send-btn:hover { background: #ccc; }

        /* INDICADOR DE DIGITAÇÃO (PONTINHOS) */
        .typing-indicator span {
            display: inline-block; width: 6px; height: 6px; 
            background-color: #fff; border-radius: 50%; margin-right: 3px;
            animation: pulseDot 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    </style>
</head>
<body>

    <header class="top-bar">
        <div class="system-logo">ANK 1.0</div>
        <div class="user-section">
            <span class="status-badge" id="user-status">MODO VISITANTE</span>
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" 
                 class="profile-pic" id="avatar-img" onclick="toggleDropdown()">
            
            <div class="dropdown" id="user-dropdown">
                {% if user %}
                    <p><b>{{ user.given_name }}</b></p>
                    <p style="font-size: 11px; color: #777;">{{ user.email }}</p>
                    <hr>
                    <button class="menu-btn" onclick="limparHistorico()">🗑️ Apagar Memória</button>
                    <button class="menu-btn" onclick="location.href='/login'">Trocar de Conta</button>
                    <button class="menu-btn logout-btn" onclick="location.href='/logout'">Sair</button>
                {% else %}
                    <p>Você não está logado.</p>
                    <hr>
                    <button class="google-btn" onclick="location.href='/login'">
                        <svg style="width:16px; height:16px;" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Entrar com Google
                    </button>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="main-view">
        <section id="chat-side">
            <div id="messages">
                <!-- RENDERIZA O HISTÓRICO SALVO QUANDO A PÁGINA CARREGA -->
                {% for msg in historico %}
                    <div class="msg-card">
                        <span class="{% if msg.role == 'user' %}label-user{% else %}label-ank{% endif %}">
                            {% if msg.role == 'user' %}{{ user.given_name if user else 'VISITANTE' }}{% else %}ANK 1.0{% endif %}
                        </span>
                        <div class="text-content js-format-history" data-raw="{{ msg.content | e }}"></div>
                    </div>
                {% endfor %}
            </div>
            <div id="input-box">
                <input type="text" id="user-msg" placeholder="Transmita comandos..." onkeypress="if(event.key === 'Enter') processSend()" autocomplete="off">
                <button class="send-btn" onclick="processSend()">ENVIAR</button>
            </div>
        </section>
    </main>

    <script>
        const activeUser = {{ user|tojson|safe if user else 'null' }};
        const msgDiv = document.getElementById('messages');
        const tick = String.fromCharCode(96);
        const tripleTick = tick + tick + tick;

        if (activeUser) {
            document.getElementById('avatar-img').src = activeUser.picture;
            document.getElementById('avatar-img').classList.add('active');
            document.getElementById('user-status').innerText = activeUser.given_name.toUpperCase();
            document.getElementById('user-status').style.color = "#fff";
        }

        function toggleDropdown() {
            const menu = document.getElementById('user-dropdown');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        window.onclick = function(event) {
            if (!event.target.matches('#avatar-img')) {
                document.getElementById('user-dropdown').style.display = 'none';
            }
        }

        async function limparHistorico() {
            if(confirm("Deseja apagar a memória da ANK permanentemente?")) {
                await fetch('/limpar_historico', { method: 'POST' });
                location.reload();
            }
        }

        // FUNÇÃO COPIAR CÓDIGO
        function copyCode(btnElement) {
            const preElement = btnElement.parentElement.nextElementSibling;
            const codeText = preElement.innerText;
            
            // Usa a API da área de transferência
            navigator.clipboard.writeText(codeText).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "✓ Copiado";
                btnElement.style.color = "#00ffcc";
                btnElement.style.borderColor = "#00ffcc";
                
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.color = "#fff";
                    btnElement.style.borderColor = "#555";
                }, 2000);
            });
        }

        // Função de formatação mestre (para histórico e mensagens novas)
        function formatarTexto(rawText) {
            let safeText = rawText.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<b style="color:#fff;">$1</b>'); 
            
            // Nova Regex para estruturar a janela de código com o botão de copiar
            const codeRegex = new RegExp(tripleTick + "([a-zA-Z]*)\\n?([\\s\\S]*?)" + tripleTick, "g");
            
            return safeText.replace(codeRegex, function(match, lang, code) {
                const languageLabel = lang ? lang.toUpperCase() : "CÓDIGO";
                return `
                <div class="code-wrapper">
                    <div class="code-header">
                        <span>${languageLabel}</span>
                        <button class="copy-btn" onclick="copyCode(this)">Copiar</button>
                    </div>
                    <pre><code class="language-${lang || 'plaintext'}">${code}</code></pre>
                </div>`;
            });
        }

        // Formata o histórico do banco de dados ao carregar a página e aplica as cores
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.js-format-history').forEach(node => {
                let txt = document.createElement('textarea');
                txt.innerHTML = node.getAttribute('data-raw');
                node.innerHTML = formatarTexto(txt.value);
            });
            // Ativa o Highlight.js (cores) em todos os blocos de código
            hljs.highlightAll();
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        // Envio com Animação e Typewriter
        async function processSend() {
            const input = document.getElementById('user-msg');
            const msg = input.value.trim();
            if(!msg) return;

            const userLabel = activeUser ? activeUser.given_name : "VISITANTE";

            msgDiv.innerHTML += `
                <div class="msg-card">
                    <span class="label-user">${userLabel}</span>
                    <div class="text-content">${msg}</div>
                </div>`;
            input.value = '';
            msgDiv.scrollTop = msgDiv.scrollHeight;

            const loadID = 'ank-load-' + Date.now();
            msgDiv.innerHTML += `
                <div id="${loadID}" class="msg-card">
                    <span class="label-ank">ANK 1.0</span>
                    <div class="text-content typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                
                const data = await response.json();
                document.getElementById(loadID).remove(); 

                const rawResponse = data.response;
                const textContainerId = 'type-' + Date.now();

                msgDiv.innerHTML += `
                    <div class="msg-card">
                        <span class="label-ank">ANK 1.0</span>
                        <div class="text-content" id="${textContainerId}"></div>
                    </div>`;
                
                const targetDiv = document.getElementById(textContainerId);
                let i = 0;

                // Lógica de Typewriter (Escrevendo...)
                function typeWriter() {
                    if (i < rawResponse.length) {
                        targetDiv.textContent += rawResponse.charAt(i);
                        i++;
                        msgDiv.scrollTop = msgDiv.scrollHeight;
                        setTimeout(typeWriter, Math.random() * 8 + 2); // Velocidade ultra rápida para não demorar
                    } else {
                        // Quando terminar, transforma em código com botão e aplica as cores
                        targetDiv.innerHTML = formatarTexto(rawResponse);
                        
                        // Encontra os novos blocos de código e aplica as cores da biblioteca Highlight
                        targetDiv.querySelectorAll('pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                        
                        msgDiv.scrollTop = msgDiv.scrollHeight;
                    }
                }
                typeWriter();

            } catch(e) {
                document.getElementById(loadID).innerHTML = "<span style='color:red;'>[ERRO DE NÚCLEO]</span>";
            }
        }
    </script>
</body>
</html>

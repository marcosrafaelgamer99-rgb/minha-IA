<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --sidebar: #050505;
            --border: #111;
            --text-main: #ffffff;
            --text-dim: #555;
            --liquid-ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; outline: none; }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* TELA DE CARREGAMENTO (PRE-LOADER) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s var(--liquid-ease);
        }
        .loader-logo {
            width: 80px; height: 80px; margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* SIDEBAR MINIMALISTA */
        #sidebar {
            width: 260px; background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 25px 15px;
            transition: transform 0.5s var(--liquid-ease);
        }

        .new-btn {
            background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 4px; font-size: 11px; font-weight: 800; cursor: pointer;
            margin-bottom: 30px; letter-spacing: 1px;
        }

        .chat-item {
            padding: 12px; font-size: 12px; color: var(--text-dim);
            cursor: pointer; display: flex; justify-content: space-between;
            border-radius: 4px; transition: 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: #0a0a0a; color: #fff; }

        /* MAIN AREA */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .top-nav {
            padding: 15px 40px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }

        .profile-pic { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 1px solid #222; }

        #viewport {
            flex: 1; overflow-y: auto; padding: 60px 22%;
            display: flex; flex-direction: column; gap: 45px;
            scroll-behavior: smooth;
        }

        /* MENSAGENS FLUIDAS */
        .msg { opacity: 0; transform: translateY(15px); animation: slideIn 0.5s var(--liquid-ease) forwards; }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }

        .role { font-size: 9px; font-weight: 900; color: #222; margin-bottom: 10px; letter-spacing: 2px; }
        .assistant .role { color: #444; }

        .body { font-size: 15px; line-height: 1.8; color: #aaa; }
        .body.thinking { color: #333; }
        .body b { color: #fff; }

        /* CODE BLOCK 2026 */
        .code-wrap {
            margin: 20px 0; background: #020202; border: 1px solid #0f0f0f; border-radius: 4px;
        }
        .code-head {
            padding: 8px 15px; background: #050505; display: flex; justify-content: space-between;
            font-size: 9px; font-weight: 800; color: #333; border-bottom: 1px solid #0f0f0f;
        }
        .copy-btn { background: transparent; border: 1px solid #111; color: #333; padding: 3px 8px; cursor: pointer; font-size: 8px; }
        .copy-btn:hover { color: #fff; border-color: #444; }
        pre { margin: 0; padding: 20px; overflow-x: auto; font-size: 13px; }

        /* INPUT AREA */
        #input-dock { padding: 40px 22%; border-top: 1px solid var(--border); display: flex; gap: 15px; }
        #msg-in {
            flex: 1; background: #080808; border: 1px solid #151515;
            color: #fff; padding: 16px 22px; border-radius: 6px; font-size: 14px;
        }
        .exec-btn { background: #fff; color: #000; border: none; padding: 0 35px; font-weight: 900; font-size: 10px; cursor: pointer; border-radius: 4px; }

        /* SCROLLBAR INVISÍVEL */
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #111; }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://i.imgur.com/86oers8.png" class="loader-logo" alt="ANK LOGO">
        <div style="font-size: 9px; letter-spacing: 5px; color: #222; font-weight: 900;">INITIALIZING ANK_CORE</div>
    </div>

    <aside id="sidebar">
        <div style="font-size: 10px; font-weight: 900; color: #111; letter-spacing: 3px; margin-bottom: 30px;">ANK 1.0</div>
        <button class="new-btn" onclick="createNewChat()">+ NEW SESSION</button>
        <div id="chat-list"></div>
    </aside>

    <main id="main">
        <header class="top-nav">
            <div id="active-title" style="font-size: 10px; font-weight: 900; color: #222;">SYSTEM_READY</div>
            {% if user %}
                <img src="{{ user.picture }}" class="profile-pic" onclick="location.href='/logout'">
            {% else %}
                <button onclick="location.href='/login'" style="background:none; border:1px solid #222; color:#444; font-size:9px; padding:5px 10px; cursor:pointer;">LOGIN</button>
            {% endif %}
        </header>

        <div id="viewport"></div>

        <div id="input-dock">
            <input type="text" id="msg-in" placeholder="Transmit command..." onkeypress="if(event.key === 'Enter') send()">
            <button class="exec-btn" onclick="send()">EXECUTE</button>
        </div>
    </main>

    <script>
        let curId = null;
        const sessions = {{ sessions | tojson | safe }};
        const vp = document.getElementById('viewport');

        // REMOVE O LOADER QUANDO TUDO CARREGA
        window.onload = () => {
            renderL();
            if(sessions.length > 0) loadC(sessions[0].id, sessions[0].title);
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
            }, 1500); // 1.5s para dar o efeito de carregamento
        };

        function renderL() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            sessions.forEach(s => {
                const d = document.createElement('div');
                d.className = `chat-item ${curId === s.id ? 'active' : ''}`;
                d.innerHTML = `<span onclick="loadC('${s.id}', '${s.title}')">${s.title}</span>`;
                list.appendChild(d);
            });
        }

        async function createNewChat() {
            const r = await fetch('/new_chat', { method: 'POST' });
            location.reload();
        }

        async function loadC(id, title) {
            curId = id;
            document.getElementById('active-title').innerText = title;
            vp.innerHTML = '';
            const r = await fetch(`/get_messages/${id}`);
            const ms = await r.json();
            ms.forEach(m => display(m.role, m.content, false));
            renderL();
            vp.scrollTop = vp.scrollHeight;
        }

        function format(t) {
            let s = t.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            const r = /```([a-z]*)\n([\s\S]*?)```/g;
            return s.replace(r, (m, lang, code) => {
                return `<div class="code-wrap"><div class="code-head"><span>${lang.toUpperCase()}</span><button class="copy-btn" onclick="copy(this)">COPY</button></div><pre><code class="language-${lang}">${code.trim()}</code></pre></div>`;
            });
        }

        function copy(b) {
            navigator.clipboard.writeText(b.closest('.code-wrap').querySelector('code').innerText);
            b.innerText = "DONE"; setTimeout(() => b.innerText = "COPY", 2000);
        }

        function display(role, content, animate) {
            const d = document.createElement('div');
            d.className = `msg ${role === 'user' ? 'user' : 'assistant'}`;
            d.innerHTML = `<div class="role">${role === 'user' ? 'USER' : 'ANK_CORE'}</div><div class="body"></div>`;
            vp.appendChild(d);
            const b = d.querySelector('.body');

            if(animate) {
                b.classList.add('thinking');
                let i = 0;
                function type() {
                    if(i < content.length) {
                        b.textContent += content.charAt(i); i++;
                        vp.scrollTop = vp.scrollHeight; setTimeout(type, 2);
                    } else {
                        b.classList.remove('thinking');
                        b.innerHTML = format(content); hljs.highlightAll();
                        vp.scrollTop = vp.scrollHeight;
                    }
                }
                type();
            } else {
                b.innerHTML = format(content); hljs.highlightAll();
            }
        }

        async function send() {
            const i = document.getElementById('msg-in');
            const m = i.value.trim(); if(!m) return;
            if(!curId) { alert("Inicie um novo chat primeiro."); return; }

            display('user', m, false); i.value = '';
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: m, chat_id: curId})
            });
            const data = await res.json();
            display('assistant', data.response, true);
        }
    </script>
</body>
</html>

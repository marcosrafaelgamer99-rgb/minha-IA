<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --sidebar: #050505;
            --border: #1a1a1a;
            --text: #e0e0e0;
            --accent: #ffffff;
            --hover: #111111;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* SCROLLBAR DARK */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        /* SIDEBAR MINIMALISTA */
        #sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            text-align: left;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: var(--hover); border-color: #444; }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            transition: 0.2s;
        }
        .history-item:hover { background: var(--hover); color: #fff; }
        .history-item.active { background: var(--hover); color: #fff; border-left: 2px solid #fff; }
        .delete-icon { opacity: 0; font-size: 12px; color: #555; transition: 0.2s; }
        .history-item:hover .delete-icon { opacity: 1; }
        .delete-icon:hover { color: #ff5555; }

        /* CONTEÚDO PRINCIPAL */
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .profile-area { position: relative; display: flex; align-items: center; gap: 12px; }
        .profile-pic { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #333; cursor: pointer; object-fit: cover; }
        
        .dropdown {
            display: none; position: absolute; top: 45px; right: 0;
            background: #0a0a0a; border: 1px solid var(--border); border-radius: 6px;
            padding: 10px; width: 180px; z-index: 200;
        }
        .dropdown button {
            width: 100%; background: transparent; border: none; color: #888;
            padding: 8px; text-align: left; cursor: pointer; font-size: 12px;
        }
        .dropdown button:hover { color: #fff; background: var(--hover); }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .msg-row { animation: fadeIn 0.3s ease-out forwards; display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; color: #444; }
        .user .label { color: #888; }
        .ank .label { color: #fff; }

        .text { font-size: 15px; line-height: 1.7; color: #ccc; }

        /* CÓDIGO 2026 */
        .code-box {
            margin: 15px 0;
            background: #080808;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .code-header {
            padding: 8px 15px;
            background: #0f0f0f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #555;
            border-bottom: 1px solid var(--border);
        }
        .copy-btn {
            background: transparent; border: 1px solid #333; color: #777;
            padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .copy-btn:hover { background: #fff; color: #000; border-color: #fff; }
        pre { margin: 0; padding: 15px; overflow-x: auto; }

        /* INPUT AREA */
        #input-area {
            padding: 30px 15%;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
        }
        #user-msg {
            flex: 1; background: #080808; border: 1px solid var(--border);
            color: #fff; padding: 14px 20px; border-radius: 6px; outline: none;
            font-size: 14px; transition: 0.3s;
        }
        #user-msg:focus { border-color: #444; background: #0a0a0a; }
        .send-btn {
            background: #fff; color: #000; border: none;
            padding: 0 30px; border-radius: 6px; font-weight: 600;
            cursor: pointer; font-size: 12px; text-transform: uppercase;
        }

        .typing { font-size: 11px; color: #333; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <div style="color: #fff; font-weight: 700; letter-spacing: 2px;">ANK 1.0</div>
            <button class="new-chat-btn" onclick="createNewChat()">+ Novo Chat</button>
        </div>
        <div id="history-list">
            <!-- Gerado via JS -->
        </div>
    </aside>

    <main id="main-container">
        <header class="top-bar">
            <div id="current-chat-title" style="font-size: 12px; color: #444; font-weight: 600;">SELECIONE UM CHAT</div>
            <div class="profile-area">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-pic" id="profile-img" onclick="toggleDrop()">
                <div class="dropdown" id="drop">
                    {% if user %}
                        <button onclick="location.href='/logout'">Sair da Conta</button>
                        <button onclick="location.href='/login'">Trocar de Conta</button>
                    {% else %}
                        <button onclick="location.href='/login'">Entrar com Google</button>
                    {% endif %}
                </div>
            </div>
        </header>

        <div id="chat-window"></div>

        <div id="input-area">
            <input type="text" id="user-msg" placeholder="Transmita comando..." onkeypress="if(event.key === 'Enter') send()">
            <button class="send-btn" onclick="send()">Enviar</button>
        </div>
    </main>

    <script>
        let currentChatId = null;
        const msgWindow = document.getElementById('chat-window');
        const historyList = document.getElementById('history-list');
        const tick = String.fromCharCode(96);
        const tripleTick = tick + tick + tick;

        // Início
        window.onload = async () => {
            const sessions = {{ sessions | tojson | safe }};
            renderHistory(sessions);
            if(sessions.length > 0) loadChat(sessions[0].id, sessions[0].title);
        };

        function renderHistory(sessions) {
            historyList.innerHTML = '';
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = `history-item ${currentChatId === s.id ? 'active' : ''}`;
                item.innerHTML = `
                    <span onclick="loadChat('${s.id}', '${s.title}')">${s.title}</span>
                    <span class="delete-icon" onclick="deleteChat('${s.id}')">✕</span>
                `;
                historyList.appendChild(item);
            });
        }

        async function createNewChat() {
            const res = await fetch('/new_chat', { method: 'POST' });
            const session = await res.json();
            currentChatId = session.id;
            location.reload();
        }

        async function loadChat(id, title) {
            currentChatId = id;
            document.getElementById('current-chat-title').innerText = title.toUpperCase();
            msgWindow.innerHTML = '';
            
            const res = await fetch(`/get_messages/${id}`);
            const msgs = await res.json();
            
            msgs.forEach(m => displayMessage(m.role, m.content, false));
            renderHistory({{ sessions | tojson | safe }}.map(s => ({...s, active: s.id === id})));
            msgWindow.scrollTop = msgWindow.scrollHeight;
        }

        async function deleteChat(id) {
            if(!confirm("Deletar este chat?")) return;
            await fetch('/delete_chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            });
            location.reload();
        }

        function toggleDrop() {
            const d = document.getElementById('drop');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        function format(t) {
            let s = t.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            s = s.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            const regex = new RegExp(tripleTick + "([a-zA-Z]*)\\n?([\\s\\S]*?)" + tripleTick, "g");
            return s.replace(regex, (m, lang, code) => {
                return `
                <div class="code-box">
                    <div class="code-header">
                        <span>${lang.toUpperCase() || 'CODE'}</span>
                        <button class="copy-btn" onclick="copyC(this)">Copiar</button>
                    </div>
                    <pre><code class="language-${lang}">${code.trim()}</code></pre>
                </div>`;
            });
        }

        function copyC(btn) {
            const code = btn.closest('.code-box').querySelector('code').innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "✓ Copiado";
            setTimeout(() => btn.innerText = "Copiar", 2000);
        }

        function displayMessage(role, content, animate) {
            const div = document.createElement('div');
            div.className = `msg-row ${role === 'user' ? 'user' : 'ank'}`;
            div.innerHTML = `<div class="label">${role === 'user' ? 'MARCOS' : 'ANK 1.0'}</div><div class="text"></div>`;
            msgWindow.appendChild(div);
            
            const textDiv = div.querySelector('.text');
            if(animate && role === 'assistant') {
                let i = 0;
                function type() {
                    if(i < content.length) {
                        textDiv.textContent += content.charAt(i);
                        i++;
                        msgWindow.scrollTop = msgWindow.scrollHeight;
                        setTimeout(type, 3);
                    } else {
                        textDiv.innerHTML = format(content);
                        hljs.highlightAll();
                    }
                }
                type();
            } else {
                textDiv.innerHTML = format(content);
                hljs.highlightAll();
            }
        }

        async function send() {
            const input = document.getElementById('user-msg');
            const msg = input.value.trim();
            if(!msg || !currentChatId) return;

            displayMessage('user', msg, false);
            input.value = '';

            const load = document.createElement('div');
            load.className = 'typing';
            load.innerText = 'ANK sintetizando...';
            msgWindow.appendChild(load);
            msgWindow.scrollTop = msgWindow.scrollHeight;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, chat_id: currentChatId})
            });
            const data = await res.json();
            load.remove();
            
            displayMessage('assistant', data.response, true);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANK 1.0 | SOBERANA</title>
    <style>
        /* ESTÉTICA HACKER ELITE 2026 - TELA CHEIA */
        body { 
            margin: 0; padding: 0; 
            background-color: #050505; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }

        /* BARRA SUPERIOR DE PERFIL */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 25px; background-color: #111; 
            border-bottom: 1px solid #00ffcc; 
            box-shadow: 0 0 15px rgba(0,255,204,0.2); 
            z-index: 100; 
        }
        .system-logo { 
            color: #00ffcc; font-weight: bold; letter-spacing: 3px; 
            font-size: 1.2rem; text-shadow: 0 0 10px rgba(0, 255, 204, 0.6); 
        }

        .user-section { position: relative; display: flex; align-items: center; gap: 15px; }
        .status-badge { 
            font-size: 11px; font-family: monospace; padding: 4px 8px; 
            border-radius: 4px; border: 1px solid #333; color: #888;
        }
        .profile-pic { 
            width: 38px; height: 38px; border-radius: 50%; 
            border: 2px solid #333; cursor: pointer; transition: 0.3s; 
            background: #222; object-fit: cover;
        }
        .profile-pic.active { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.4); }

        /* MENU DROPDOWN */
        .dropdown { 
            display: none; position: absolute; top: 50px; right: 0; 
            background: #121212; border: 1px solid #333; border-radius: 8px; 
            padding: 15px; width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            z-index: 200;
        }
        .dropdown p { margin: 0 0 10px 0; font-size: 13px; color: #fff; }
        .dropdown hr { border: 0; border-top: 1px solid #333; margin: 10px 0; }
        .menu-btn { 
            width: 100%; padding: 10px; margin-bottom: 5px; 
            background: #1a1a1a; border: 1px solid #444; color: #ccc; 
            border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .menu-btn:hover { background: #00ffcc; color: #000; border-color: #00ffcc; }
        .logout-btn { color: #ff4444; border-color: #3a1111; }
        .logout-btn:hover { background: #ff4444; color: #fff; }

        /* ÁREA PRINCIPAL CENTRALIZADA */
        .main-view { 
            display: flex; flex: 1; overflow: hidden; 
            justify-content: center; background-color: #050505;
        }
        
        /* CHAT CONTAINER (AGORA OCUPA O CENTRO DA TELA) */
        #chat-side { 
            width: 100%; max-width: 1000px; /* Limita a largura para ficar elegante */
            display: flex; flex-direction: column; 
            background-color: #0a0a0a; 
            border-left: 1px solid #1f1f1f;
            border-right: 1px solid #1f1f1f;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #messages { 
            flex: 1; overflow-y: auto; padding: 30px; 
            display: flex; flex-direction: column; gap: 20px; 
            scroll-behavior: smooth;
        }

        /* CAIXAS DE MENSAGEM */
        .msg-card { 
            background-color: #121212; border: 1px solid #222; 
            border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .label-user { color: #00bcd4; font-weight: bold; font-size: 12px; margin-bottom: 8px; display: block; text-transform: uppercase;}
        .label-ank { color: #00ffcc; font-weight: bold; font-size: 12px; margin-bottom: 8px; display: block; text-shadow: 0 0 5px rgba(0,255,204,0.3); }
        .text-content { font-size: 15px; line-height: 1.6; color: #d4d4d4; }
        
        /* BLOCOS DE CÓDIGO NO CHAT */
        .code-snippet { 
            background: #000; border: 1px solid #333; border-left: 3px solid #00ffcc; 
            padding: 15px; margin-top: 15px; border-radius: 4px; 
            font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; 
            color: #a6e22e; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
        }

        /* INPUT AREA */
        #input-box { 
            padding: 25px; display: flex; gap: 15px; 
            background-color: #080808; border-top: 1px solid #1f1f1f; 
        }
        #user-msg { 
            flex: 1; background: #121212; border: 1px solid #333; 
            color: #fff; padding: 15px 20px; border-radius: 8px; outline: none;
            font-size: 15px;
        }
        #user-msg:focus { border-color: #00ffcc; }
        .send-btn { 
            background: #00ffcc; color: #000; border: none; 
            padding: 0 35px; border-radius: 8px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-size: 14px; letter-spacing: 1px;
        }
        .send-btn:hover { background: #00e6b8; box-shadow: 0 0 15px rgba(0,255,204,0.5); }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="system-logo">ANK 1.0 NÚCLEO</div>
        <div class="user-section">
            <span class="status-badge" id="user-status">STATUS: VISITANTE</span>
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" 
                 class="profile-pic" id="avatar-img" onclick="toggleDropdown()">
            
            <div class="dropdown" id="user-dropdown">
                {% if user %}
                    <p><b>{{ user.given_name }}</b></p>
                    <p style="font-size: 11px; color: #777;">{{ user.email }}</p>
                    <hr>
                    <button class="menu-btn" onclick="location.href='/login'">Trocar de Conta</button>
                    <button class="menu-btn logout-btn" onclick="location.href='/logout'">Sair do Sistema</button>
                {% else %}
                    <p>Modo Visitante Ativo</p>
                    <hr>
                    <button class="menu-btn" onclick="location.href='/login'">Entrar com Google</button>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="main-view">
        <section id="chat-side">
            <div id="messages"></div>
            <div id="input-box">
                <input type="text" id="user-msg" placeholder="Digite seu comando para a ANK..." onkeypress="if(event.key === 'Enter') processSend()">
                <button class="send-btn" onclick="processSend()">EXECUTAR</button>
            </div>
        </section>
    </main>

    <script>
        // Lida com o usuário injetado pelo Flask
        const activeUser = {{ user|tojson|safe if user else 'null' }};

        // Atualiza a interface caso o usuário esteja logado
        if (activeUser) {
            document.getElementById('avatar-img').src = activeUser.picture;
            document.getElementById('avatar-img').classList.add('active');
            document.getElementById('user-status').innerText = "CONECTADO: " + activeUser.given_name.toUpperCase();
            document.getElementById('user-status').style.color = "#00ffcc";
        }

        // Função para abrir/fechar o menu de perfil
        function toggleDropdown() {
            const menu = document.getElementById('user-dropdown');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        // Fechar menu ao clicar fora
        window.onclick = function(event) {
            if (!event.target.matches('#avatar-img')) {
                const dropdowns = document.getElementsByClassName("dropdown");
                for (let i = 0; i < dropdowns.length; i++) {
                    let openDropdown = dropdowns[i];
                    if (openDropdown.style.display === 'block') {
                        openDropdown.style.display = 'none';
                    }
                }
            }
        }

        // Truque Mestre para as crases no Regex não quebrarem o Canvas
        const tick = String.fromCharCode(96);
        const tripleTick = tick + tick + tick;

        // Enviar mensagens para o backend
        async function processSend() {
            const input = document.getElementById('user-msg');
            const msg = input.value.trim();
            if(!msg) return;

            const msgDiv = document.getElementById('messages');
            const userLabel = activeUser ? activeUser.given_name : "VISITANTE";

            // MOSTRAR MSG DO USUÁRIO
            msgDiv.innerHTML += `
                <div class="msg-card">
                    <span class="label-user">${userLabel}:</span>
                    <div class="text-content">${msg}</div>
                </div>`;
            input.value = '';
            msgDiv.scrollTop = msgDiv.scrollHeight;

            // LOADING DA ANK
            const loadID = 'ank-load-' + Date.now();
            msgDiv.innerHTML += `
                <div id="${loadID}" class="msg-card">
                    <span class="label-ank">ANK_REPLY:</span>
                    <div class="text-content" style="color: #555;">Processando conexão neural...</div>
                </div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;

            try {
                // Fetch na API do Flask
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                
                const data = await response.json();
                document.getElementById(loadID).remove();

                const rawResponse = data.response;

                // FORMATAR RESPOSTA NO CHAT (Texto limpo e blocos de código)
                let formattedText = rawResponse
                    .replace(/</g, "&lt;").replace(/>/g, "&gt;") // Escapar tags html pra não quebrar a UI
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); // Converte negrito
                
                // Extrai blocos de código markdown para div bonitas no chat
                const displayRegex = new RegExp(tripleTick + "(?:html|css|js|python)?\\s*([\\s\\S]*?)" + tripleTick, "g");
                formattedText = formattedText.replace(displayRegex, '<div class="code-snippet">$1</div>');

                msgDiv.innerHTML += `
                    <div class="msg-card">
                        <span class="label-ank">ANK_REPLY:</span>
                        <div class="text-content">${formattedText}</div>
                    </div>`;
                
                msgDiv.scrollTop = msgDiv.scrollHeight;

            } catch(e) {
                document.getElementById(loadID).innerHTML = "<span class='label-ank'>ANK_ERROR:</span> Falha na conexão com o servidor Cerebras.";
            }
        }
    </script>
</body>
</html>
